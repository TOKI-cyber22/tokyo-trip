    var typeClass=TC[item.type]||"c-gray";
    var typeLabel=TL[item.type]||"";
    var areaHtml=item.q?'<a href="'+mapsUrl(item.q)+'" target="_blank" style="color:var(--color-text-info);text-decoration:none;display:flex;align-items:center;gap:4px;font-size:12px;margin-top:2px"><i class="ti ti-map-pin" aria-hidden="true" style="font-size:13px"></i>'+item.a+'</a>':'<div style="font-size:12px;color:var(--color-text-secondary);margin-top:2px">'+item.a+'</div>';
    var hHtml=item.h?'<div style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--color-text-secondary);margin-top:2px"><i class="ti ti-clock" aria-hidden="true" style="font-size:13px"></i>'+item.h+'</div>':'';
    var trHtml=item.tr?'<div style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--color-text-secondary);margin-top:2px"><i class="ti ti-train" aria-hidden="true" style="font-size:13px"></i>'+item.tr+'</div>':'';
    var aetaHtml='';
    if(item.aeta&&item.aeta.length>0){
      aetaHtml='<div class="c-purple" style="margin-top:8px;border-radius:var(--border-radius-md);padding:8px 10px">'+
        '<div style="font-size:11px;font-weight:500;display:flex;align-items:center;gap:4px;margin-bottom:4px"><i class="ti ti-shopping-bag" aria-hidden="true" style="font-size:13px"></i>附近 Aeta 販賣點</div>'+
        item.aeta.map(function(name){
          var q2=AETA_STORES[name]||name;
          return '<a href="'+mapsUrl(q2)+'" target="_blank" style="display:flex;align-items:center;gap:4px;font-size:11px;text-decoration:none;padding:1px 0"><span>•</span>'+name+'<i class="ti ti-external-link" aria-hidden="true" style="font-size:10px"></i></a>';
        }).join('')+
        '</div>';
    }
    var dealsHtml='';
    if(item.deals&&item.deals.length>0){
      dealsHtml='<div class="c-coral" style="margin-top:8px;border-radius:var(--border-radius-md);padding:8px 10px">'+
        '<div style="font-size:11px;font-weight:500;display:flex;align-items:center;gap:4px;margin-bottom:5px"><i class="ti ti-coin" aria-hidden="true" style="font-size:13px"></i>購物備註</div>'+
        item.deals.map(function(dl){
          return '<div style="font-size:11px;margin-bottom:4px;line-height:1.5"><b style="font-weight:600">'+dl.b+'</b>：'+dl.d+'</div>';
        }).join('')+
        '</div>';
    }
    var wHtml=item.w?'<div style="display:flex;align-items:flex-start;gap:4px;font-size:11px;color:var(--color-text-danger);margin-top:6px"><i class="ti ti-alert-triangle" aria-hidden="true" style="font-size:13px;margin-top:1px"></i>'+item.w+'</div>':'';

    html+='<div style="display:flex;gap:8px;margin-bottom:8px">'+
      '<div style="min-width:42px;font-size:11px;color:var(--color-text-tertiary);padding-top:4px;text-align:right;flex-shrink:0">'+item.t+'</div>'+
      '<div style="flex:1;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:8px 10px;background:var(--color-background-primary)">'+
        '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:2px">'+
          '<span class="'+typeClass+'" style="font-size:10px;padding:2px 7px;border-radius:99px;font-weight:500">'+typeLabel+'</span>'+
          '<span style="font-size:13px;font-weight:500;color:var(--color-text-primary)">'+item.n+'</span>'+
        '</div>'+
        areaHtml+hHtml+trHtml+aetaHtml+dealsHtml+wHtml+
      '</div>'+
    '</div>';
  });
});

if(day.res&&day.res.length>0){
  html+='<div style="margin-top:14px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 12px;background:var(--color-background-secondary)">'+
    '<div style="font-size:12px;font-weight:500;color:var(--color-text-primary);margin-bottom:6px">提醒</div>'+
    day.res.map(function(r){return '<div style="font-size:11px;color:var(--color-text-secondary);padding:2px 0;line-height:1.5">'+r.d+'</div>';}).join('')+
  '</div>';
}

panel.innerHTML=html;
panelsEl.appendChild(panel);
});
</script>
